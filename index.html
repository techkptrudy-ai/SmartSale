<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Pro v2.1</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans">

    <div class="max-w-md mx-auto bg-white shadow-2xl min-h-screen flex flex-col">
        
        <header class="bg-indigo-600 p-6 text-white rounded-b-3xl shadow-lg">
            <h1 class="text-2xl font-black flex items-center justify-center gap-2">
                <span>📦</span> STOCK MASTER PRO
            </h1>
            <p class="text-indigo-100 text-center text-xs mt-1 opacity-80">Manajemen Stok Lokal & Aman</p>
        </header>

        <main class="p-6 flex-grow">
            <div class="relative overflow-hidden rounded-3xl border-4 border-slate-100 mb-4 bg-slate-900 h-64 shadow-inner flex items-center justify-center">
                <div id="reader" class="w-full h-full"></div>
                <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white bg-slate-800 transition-opacity duration-300">
                    <div class="w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center mb-3 shadow-lg text-3xl">📷</div>
                    <p class="text-sm font-semibold opacity-60 italic">Kamera Siap Digunakan</p>
                </div>
            </div>

            <div class="flex gap-3 mb-6">
                <button id="btn-start" onclick="startScanner()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-indigo-200 shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>🔍</span> Mulai Scan
                </button>
                <button id="btn-stop" onclick="stopScanner()" class="hidden flex-1 bg-rose-500 hover:bg-rose-600 text-white py-4 rounded-2xl font-bold shadow-rose-200 shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>⏹️</span> Berhenti
                </button>
            </div>
            
            <div id="info-box" class="p-5 bg-indigo-50 rounded-3xl mb-8 hidden border-2 border-indigo-100 animate-bounce-short">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold">
                    <span class="bg-indigo-200 text-indigo-700 px-3 py-1 rounded-full font-mono" id="result-id">ID: -</span>
                    <button onclick="closeInfoBox()" class="text-gray-400 hover:text-gray-600">✕</button>
                </div>
                
                <label class="block text-[10px] font-bold text-indigo-400 uppercase ml-1">Nama Barang</label>
                <input id="input-nama" type="text" placeholder="Masukkan nama..." class="w-full bg-white text-lg font-bold text-slate-800 border-2 border-transparent focus:border-indigo-400 rounded-xl px-4 py-2 focus:outline-none mb-4 shadow-sm">
                
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-indigo-100">
                    <span class="text-sm font-bold text-slate-500">Jumlah Stok</span>
                    <div class="flex items-center gap-5">
                        <button onclick="updateStok(-1)" class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl font-black text-xl hover:bg-rose-100">-</button>
                        <span id="result-qty" class="text-3xl font-black text-slate-800 min-w-[30px] text-center">0</span>
                        <button onclick="updateStok(1)" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl font-black text-xl hover:bg-emerald-100">+</button>
                    </div>
                </div>
                
                <button onclick="saveItem()" class="w-full mt-5 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-indigo-200 shadow-xl hover:bg-indigo-700 active:scale-95">💾 Simpan ke Database</button>
            </div>

            <button onclick="exportToExcel()" class="w-full flex items-center justify-center gap-3 bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-emerald-100 shadow-xl transition-all mb-8 active:scale-95">
                <span>📊</span> DOWNLOAD EXCEL
            </button>

            <div class="mb-6 relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400">
                    <span>🔎</span>
                </div>
                <input id="search-input" type="text" oninput="renderList()" placeholder="Cari nama atau ID barang..." class="w-full bg-slate-100 border-2 border-transparent focus:border-indigo-300 rounded-2xl py-3 pl-12 pr-4 text-sm font-medium focus:outline-none transition-all shadow-inner">
            </div>

            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black text-slate-700 uppercase tracking-wider text-xs">Inventaris Lokal</h3>
                <span id="total-badge" class="text-[10px] bg-slate-200 px-3 py-1 rounded-full font-bold text-slate-500">0 Item</span>
            </div>
            
            <div id="inventory-list" class="space-y-4">
                </div>
        </main>

        <footer class="p-6 text-center text-[10px] text-slate-400 font-medium">
            Smart Inventory v2.1 &bull; 2026
        </footer>
    </div>

    <script>
        let db;
        let currentId = "";
        let html5QrCode;

        const request = indexedDB.open("SmartInventoryDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("items", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderList();
        };

        async function startScanner() {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                alert("Gunakan HTTPS untuk akses kamera.");
                return;
            }
            document.getElementById('scanner-placeholder').classList.add('opacity-0');
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');

            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (id) => {
                    currentId = id;
                    document.getElementById('info-box').classList.remove('hidden');
                    document.getElementById('result-id').innerText = "UID: " + id;
                    loadItemData(id);
                    stopScanner();
                    if(window.navigator.vibrate) window.navigator.vibrate(100);
                });
            } catch (err) {
                alert("Akses Kamera Gagal!");
                stopScanner();
            }
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
            document.getElementById('scanner-placeholder').classList.remove('opacity-0');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
        }

        function loadItemData(id) {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const req = store.get(id);
            req.onsuccess = () => {
                const item = req.result || { nama: "", qty: 0 };
                document.getElementById('input-nama').value = item.nama;
                document.getElementById('result-qty').innerText = item.qty;
                document.getElementById('input-nama').focus();
            };
        }

        function updateStok(val) {
            let el = document.getElementById('result-qty');
            let newQty = parseInt(el.innerText) + val;
            if (newQty < 0) newQty = 0;
            el.innerText = newQty;
        }

        function saveItem() {
            const nama = document.getElementById('input-nama').value;
            const qty = parseInt(document.getElementById('result-qty').innerText);
            if(!nama) return alert("Harap isi Nama Barang!");

            const store = db.transaction(["items"], "readwrite").objectStore("items");
            store.put({ 
                id: currentId, 
                nama: nama, 
                qty: qty, 
                lastUpdate: new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) 
            });
            
            renderList();
            document.getElementById('info-box').classList.add('hidden');
            alert("✅ Tersimpan!");
        }

        function renderList() {
            const listContainer = document.getElementById('inventory-list');
            const totalBadge = document.getElementById('total-badge');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            listContainer.innerHTML = "";
            let count = 0;

            const store = db.transaction(["items"], "readonly").objectStore("items");
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    const matchName = item.nama.toLowerCase().includes(searchTerm);
                    const matchId = item.id.toLowerCase().includes(searchTerm);

                    if (matchName || matchId) {
                        count++;
                        listContainer.innerHTML += `
                            <div onclick="editExisting('${item.id}')" class="flex justify-between items-center p-4 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md active:scale-95 transition-all cursor-pointer border-l-8 border-l-indigo-500">
                                <div class="overflow-hidden pr-2">
                                    <p class="font-black text-slate-800 truncate text-base">${item.nama}</p>
                                    <p class="text-[9px] text-slate-400 font-mono mt-1">${item.id}</p>
                                    <p class="text-[9px] text-indigo-400 mt-0.5 font-bold tracking-tight">${item.lastUpdate}</p>
                                </div>
                                <div class="bg-indigo-50 px-4 py-2 rounded-2xl text-center">
                                    <p class="text-xl font-black text-indigo-600 leading-none">${item.qty}</p>
                                    <p class="text-[8px] text-indigo-300 font-bold mt-1 uppercase">Unit</p>
                                </div>
                            </div>`;
                    }
                    cursor.continue();
                }
                totalBadge.innerText = count + " Item Ditemukan";
                if(count === 0 && searchTerm !== "") {
                    listContainer.innerHTML = `<p class="text-center text-xs text-slate-400 py-10">Barang tidak ditemukan...</p>`;
                }
            };
        }

        function editExisting(id) {
            currentId = id;
            document.getElementById('info-box').classList.remove('hidden');
            document.getElementById('result-id').innerText = "UID: " + id;
            loadItemData(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeInfoBox() { document.getElementById('info-box').classList.add('hidden'); }

        function exportToExcel() {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const allData = [];
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    allData.push(cursor.value);
                    cursor.continue();
                } else {
                    if(allData.length === 0) return alert("Data kosong!");
                    const worksheet = XLSX.utils.json_to_sheet(allData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "LAPORAN");
                    XLSX.writeFile(workbook, `Laporan_Stok.xlsx`);
                }
            };
        }
    </script>
</body>
</html>
