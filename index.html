<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div class="max-w-md mx-auto bg-white shadow-xl min-h-screen p-6">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-600">📦 Inventory Master</h1>
        
        <div class="relative overflow-hidden rounded-2xl border-4 border-indigo-100 mb-4 bg-gray-900 h-64 flex items-center justify-center">
            <div id="reader" class="w-full h-full"></div>
            <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white bg-gray-800 pointer-events-none">
                <span class="text-4xl mb-2">📷</span>
                <p class="text-sm opacity-70">Kamera Nonaktif</p>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="btn-start" onclick="startScanner()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                🚀 Mulai Scan
            </button>
            <button id="btn-stop" onclick="stopScanner()" class="hidden flex-1 bg-red-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                🛑 Berhenti
            </button>
        </div>
        
        <div id="info-box" class="p-4 bg-indigo-50 rounded-xl mb-4 hidden border-2 border-indigo-200">
            <p class="text-xs text-indigo-400 font-bold uppercase tracking-wider">Mode Input/Edit:</p>
            <input id="input-nama" type="text" placeholder="Masukkan Nama Barang..." class="w-full bg-transparent text-xl font-bold text-indigo-900 border-b-2 border-indigo-300 focus:outline-none focus:border-indigo-600 mb-2 py-1">
            <p id="result-id" class="text-[10px] text-gray-400 font-mono"></p>
            
            <div class="flex items-center justify-between mt-4 bg-white p-3 rounded-lg shadow-sm">
                <span class="text-sm font-medium text-gray-600">Stok:</span>
                <div class="flex items-center gap-4">
                    <button onclick="updateStok(-1)" class="w-10 h-10 bg-red-100 text-red-600 rounded-full font-bold text-xl">-</button>
                    <span id="result-qty" class="text-2xl font-black text-gray-800">0</span>
                    <button onclick="updateStok(1)" class="w-10 h-10 bg-green-100 text-green-600 rounded-full font-bold text-xl">+</button>
                </div>
            </div>
            <div class="flex gap-2 mt-3">
                <button onclick="saveItem()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-semibold shadow-md active:scale-95 transition-all">Simpan Data</button>
                <button onclick="document.getElementById('info-box').classList.add('hidden')" class="bg-gray-200 text-gray-600 px-4 py-2 rounded-lg font-semibold">Batal</button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-3 mb-8 text-center">
            <button onclick="exportToExcel()" class="bg-emerald-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-600 transition-all">
                📊 Download Laporan Excel
            </button>
        </div>

        <h3 class="font-bold text-gray-700 mb-3 flex justify-between items-center px-1">
            Daftar Stok
            <span id="total-badge" class="text-[10px] bg-gray-200 px-2 py-1 rounded-full text-gray-500">0 Item</span>
        </h3>
        <div id="inventory-list" class="space-y-3">
            </div>
    </div>

    <script>
        let db;
        let currentId = "";
        let html5QrCode;

        // 1. Database Initialization
        const request = indexedDB.open("SmartInventoryDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("items", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderList();
        };

        // 2. SCANNER LOGIC
        async function startScanner() {
            document.getElementById('scanner-placeholder').classList.add('hidden');
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: 250 },
                    (id) => {
                        currentId = id;
                        document.getElementById('info-box').classList.remove('hidden');
                        document.getElementById('result-id').innerText = "UID: " + id;
                        loadItemData(id);
                        stopScanner();
                        if(window.navigator.vibrate) window.navigator.vibrate(100);
                    }
                );
            } catch (err) {
                alert("Kamera gagal diakses: " + err);
                stopScanner();
            }
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            document.getElementById('scanner-placeholder').classList.remove('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
        }

        // 3. Data Logic
        function loadItemData(id) {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const req = store.get(id);
            req.onsuccess = () => {
                const item = req.result || { nama: "", qty: 0 };
                document.getElementById('input-nama').value = item.nama;
                document.getElementById('result-qty').innerText = item.qty;
            };
        }

        // FUNGSI BARU: Edit dari List
        function editItem(id) {
            currentId = id;
            document.getElementById('info-box').classList.remove('hidden');
            document.getElementById('result-id').innerText = "UID: " + id;
            loadItemData(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStok(val) {
            let el = document.getElementById('result-qty');
            let newQty = parseInt(el.innerText) + val;
            if (newQty < 0) newQty = 0;
            el.innerText = newQty;
        }

        function saveItem() {
            const nama = document.getElementById('input-nama').value;
            const qty = parseInt(document.getElementById('result-qty').innerText);
            if(!nama) return alert("Isi nama barang!");

            const store = db.transaction(["items"], "readwrite").objectStore("items");
            store.put({ id: currentId, nama: nama, qty: qty, lastUpdate: new Date().toLocaleString() });
            
            alert("✅ Data Berhasil Diperbarui!");
            renderList();
            document.getElementById('info-box').classList.add('hidden');
        }

        function renderList() {
            const listContainer = document.getElementById('inventory-list');
            const totalBadge = document.getElementById('total-badge');
            listContainer.innerHTML = "";
            let count = 0;

            const store = db.transaction(["items"], "readonly").objectStore("items");
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    count++;
                    const item = cursor.value;
                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-white border border-gray-100 rounded-xl shadow-sm border-l-4 border-l-indigo-500">
                            <div class="overflow-hidden flex-1">
                                <p class="font-bold text-gray-800 truncate text-sm">${item.nama}</p>
                                <p class="text-[10px] text-gray-400 font-mono">${item.id}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="text-right">
                                    <p class="text-lg font-black text-indigo-600">${item.qty}</p>
                                </div>
                                <button onclick="editItem('${item.id}')" class="bg-amber-100 text-amber-600 p-2 rounded-lg hover:bg-amber-200 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                                    </svg>
                                </button>
                            </div>
                        </div>`;
                    cursor.continue();
                }
                totalBadge.innerText = count + " Item";
            };
        }

        function exportToExcel() {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const allData = [];
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    allData.push(cursor.value);
                    cursor.continue();
                } else {
                    if(allData.length === 0) return alert("Belum ada data!");
                    const worksheet = XLSX.utils.json_to_sheet(allData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan");
                    XLSX.writeFile(workbook, `Stok_Laporan.xlsx`);
                }
            };
        }
    </script>
</body>
</html>
