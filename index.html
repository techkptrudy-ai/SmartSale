<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Pro - Barcode Ready</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Agar area kamera tidak kotak sempurna, tapi persegi panjang (cocok untuk barcode batang) */
        #reader__scan_region { background: white ! stroke: #4f46e5; }
        #reader video { object-fit: cover !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10 font-sans">

    <div class="max-w-md mx-auto bg-white shadow-xl min-h-screen p-6 relative">
        <h1 class="text-2xl font-black mb-6 text-center text-indigo-600 flex items-center justify-center gap-2">
            <span>📦</span> Inventory Master
        </h1>
        
        <div class="relative overflow-hidden rounded-2xl border-4 border-indigo-100 mb-4 bg-black h-64 flex items-center justify-center shadow-inner">
            <div id="reader" class="w-full h-full"></div>
            <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white bg-slate-800 pointer-events-none transition-opacity duration-300">
                <span class="text-5xl mb-3 animate-pulse">📷</span>
                <p class="text-sm font-medium opacity-70 tracking-wide">SIAP MEMINDAI</p>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="btn-start" onclick="startScanner()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                🚀 Mulai Scan
            </button>
            <button id="btn-stop" onclick="stopScanner()" class="hidden flex-1 bg-rose-500 hover:bg-rose-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                🛑 Berhenti
            </button>
        </div>
        
        <div id="info-box" class="p-5 bg-indigo-50 rounded-2xl mb-6 hidden border-2 border-indigo-200 shadow-sm animate-in fade-in duration-300">
            <p class="text-[10px] text-indigo-500 font-black uppercase tracking-[0.2em] mb-1">Data Terdeteksi</p>
            <input id="input-nama" type="text" placeholder="Ketik Nama Barang Baru..." class="w-full bg-transparent text-xl font-bold text-indigo-900 border-b-2 border-indigo-200 focus:outline-none focus:border-indigo-600 mb-2 py-1 transition-colors">
            <p id="result-id" class="text-[11px] text-gray-400 font-mono bg-white inline-block px-2 py-0.5 rounded border border-gray-100"></p>
            
            <div class="flex items-center justify-between mt-6 bg-white p-4 rounded-xl shadow-sm border border-indigo-100">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-tight">Jumlah Stok</span>
                <div class="flex items-center gap-4">
                    <button onclick="updateStok(-1)" class="w-10 h-10 bg-rose-50 text-rose-600 rounded-full font-black text-xl hover:bg-rose-100">-</button>
                    <span id="result-qty" class="text-3xl font-black text-slate-800 min-w-[40px] text-center">0</span>
                    <button onclick="updateStok(1)" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full font-black text-xl hover:bg-emerald-100">+</button>
                </div>
            </div>
            <button onclick="saveItem()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                ✅ Simpan ke Database
            </button>
        </div>

        <div class="grid grid-cols-1 gap-3 mb-8">
            <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-2xl font-bold shadow-lg transition-all flex items-center justify-center gap-2">
                📊 Download Laporan (Excel)
            </button>
        </div>

        <h3 class="font-bold text-gray-800 mb-4 flex justify-between items-center px-1 border-b pb-2">
            Riwayat Stok
            <span id="total-badge" class="text-xs bg-indigo-100 px-3 py-1 rounded-full text-indigo-600 font-bold uppercase tracking-wider">0 Item</span>
        </h3>
        <div id="inventory-list" class="space-y-3">
            </div>
    </div>

    <script>
        let db;
        let currentId = "";
        let html5QrCode;

        // 1. Inisialisasi Database (IndexedDB)
        const request = indexedDB.open("SmartInventoryDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("items", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderList();
        };

        // 2. LOGIKA SCANNER (UPDATED: Support Barcode Retail)
        async function startScanner() {
            document.getElementById('scanner-placeholder').classList.add('opacity-0');
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            // DAFTAR FORMAT BARCODE YANG DIDUKUNG (Retail Ready)
            const formatsToSupport = [
                Html5QrcodeSupportedFormats.EAN_13, // Barcode barang supermarket
                Html5QrcodeSupportedFormats.EAN_8,  // Barcode barang kecil
                Html5QrcodeSupportedFormats.UPC_A,  // Standar US
                Html5QrcodeSupportedFormats.UPC_E,
                Html5QrcodeSupportedFormats.CODE_128, // Barcode logistik/expedisi
                Html5QrcodeSupportedFormats.QR_CODE   // QR Code biasa
            ];

            const config = { 
                fps: 15, 
                // qrbox dibuat persegi panjang (280x150) agar cocok untuk scan barcode batang
                qrbox: { width: 280, height: 150 },
                aspectRatio: 1.0,
                formatsToSupport: formatsToSupport
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (id) => {
                        // JIKA SCAN BERHASIL
                        currentId = id;
                        document.getElementById('info-box').classList.remove('hidden');
                        document.getElementById('result-id').innerText = "KODE: " + id;
                        loadItemData(id);
                        stopScanner(); 
                        if(window.navigator.vibrate) window.navigator.vibrate(80); // Getaran sukses
                    }
                );
            } catch (err) {
                console.error("Kamera Error:", err);
                alert("Izin Kamera Diperlukan!");
                stopScanner();
            }
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            document.getElementById('scanner-placeholder').classList.remove('opacity-0');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
        }

        // 3. Logika Data & Database
        function loadItemData(id) {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const req = store.get(id);
            req.onsuccess = () => {
                const item = req.result || { nama: "", qty: 0 };
                document.getElementById('input-nama').value = item.nama;
                document.getElementById('result-qty').innerText = item.qty;
                if(!item.nama) document.getElementById('input-nama').focus();
            };
        }

        function updateStok(val) {
            let el = document.getElementById('result-qty');
            let newQty = parseInt(el.innerText) + val;
            if (newQty < 0) newQty = 0;
            el.innerText = newQty;
        }

        function saveItem() {
            const nama = document.getElementById('input-nama').value;
            const qty = parseInt(document.getElementById('result-qty').innerText);
            if(!nama) return alert("⚠️ Beri nama barang dulu!");

            const store = db.transaction(["items"], "readwrite").objectStore("items");
            store.put({ 
                id: currentId, 
                nama: nama, 
                qty: qty, 
                lastUpdate: new Date().toLocaleString('id-ID') 
            });
            
            renderList();
            document.getElementById('info-box').classList.add('hidden');
            // Reset input
            document.getElementById('input-nama').value = "";
        }

        function renderList() {
            const listContainer = document.getElementById('inventory-list');
            const totalBadge = document.getElementById('total-badge');
            listContainer.innerHTML = "";
            let count = 0;

            const store = db.transaction(["items"], "readonly").objectStore("items");
            store.openCursor(null, "prev").onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    count++;
                    const item = cursor.value;
                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-2xl shadow-sm border-l-4 border-l-indigo-500 animate-in slide-in-from-left duration-300">
                            <div class="overflow-hidden">
                                <p class="font-bold text-slate-800 truncate text-sm uppercase">${item.nama}</p>
                                <p class="text-[10px] text-gray-400 font-mono tracking-tighter">${item.id} • ${item.lastUpdate}</p>
                            </div>
                            <div class="text-right ml-4">
                                <p class="text-xl font-black text-indigo-600">${item.qty}</p>
                                <p class="text-[9px] font-bold text-gray-300">STOK</p>
                            </div>
                        </div>`;
                    cursor.continue();
                }
                totalBadge.innerText = count + " Item";
            };
        }

        function exportToExcel() {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const allData = [];
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    allData.push(cursor.value);
                    cursor.continue();
                } else {
                    if(allData.length === 0) return alert("Belum ada data untuk diunduh!");
                    const worksheet = XLSX.utils.json_to_sheet(allData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "Stok Barang");
                    XLSX.writeFile(workbook, `Laporan_Stok_${new Date().toLocaleDateString()}.xlsx`);
                }
            };
        }
    </script>
</body>
</html>
