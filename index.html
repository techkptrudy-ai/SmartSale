<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Pro v2.2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans">

    <div class="max-w-md mx-auto bg-white shadow-2xl min-h-screen flex flex-col">
        
        <header class="bg-indigo-600 p-6 text-white rounded-b-[2.5rem] shadow-lg text-center">
            <h1 class="text-2xl font-black tracking-tighter flex items-center justify-center gap-2">
                <span>📦</span> STOCK MASTER PRO
            </h1>
            <p class="text-indigo-100 text-[10px] mt-1 font-medium tracking-widest uppercase opacity-80">Inventory Management System</p>
        </header>

        <main class="p-6 flex-grow">
            <div class="relative overflow-hidden rounded-[2rem] border-4 border-slate-100 mb-4 bg-slate-900 h-64 shadow-inner flex items-center justify-center">
                <div id="reader" class="w-full h-full"></div>
                <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white bg-slate-800 transition-all duration-500">
                    <div class="w-20 h-20 bg-slate-700 rounded-full flex items-center justify-center mb-3 shadow-2xl animate-pulse">
                        <span class="text-4xl text-indigo-400">📷</span>
                    </div>
                    <p class="text-xs font-bold opacity-40 tracking-widest uppercase">Kamera Siap</p>
                </div>
            </div>

            <div class="flex gap-3 mb-8">
                <button id="btn-start" onclick="startScanner()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-indigo-200 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span id="label-start">🔍 Mulai Scan</span>
                </button>
                <button id="btn-stop" onclick="stopScanner()" class="hidden flex-1 bg-rose-500 hover:bg-rose-600 text-white py-4 rounded-2xl font-bold shadow-rose-200 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>⏹️ Berhenti</span>
                </button>
            </div>
            
            <div id="info-box" class="p-5 bg-indigo-50 rounded-[2rem] mb-8 hidden border-2 border-indigo-100 shadow-inner">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] bg-indigo-200 text-indigo-700 px-3 py-1 rounded-full font-mono font-black" id="result-id">ID: -</span>
                    <button onclick="closeInfoBox()" class="text-slate-400 hover:text-slate-600 font-bold">✕</button>
                </div>
                
                <label class="block text-[10px] font-black text-indigo-400 uppercase mb-1 ml-1 tracking-widest">Nama Barang</label>
                <input id="input-nama" type="text" placeholder="Masukkan nama barang..." class="w-full bg-white text-lg font-bold text-slate-800 border-2 border-transparent focus:border-indigo-400 rounded-xl px-4 py-3 focus:outline-none mb-5 shadow-sm transition-all">
                
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 mb-5">
                    <span class="text-sm font-bold text-slate-500">Jumlah Stok</span>
                    <div class="flex items-center gap-5">
                        <button onclick="updateStok(-1)" class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl font-black text-xl hover:bg-rose-100">-</button>
                        <span id="result-qty" class="text-3xl font-black text-slate-800 min-w-[40px] text-center leading-none">0</span>
                        <button onclick="updateStok(1)" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl font-black text-xl hover:bg-emerald-100">+</button>
                    </div>
                </div>
                
                <button onclick="saveItem()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-indigo-200 shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">
                    💾 SIMPAN DATA
                </button>
            </div>

            <div class="grid grid-cols-4 gap-2 mb-8">
                <div class="col-span-3 relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 text-xs">🔎</span>
                    <input id="search-input" type="text" oninput="renderList()" placeholder="Cari nama barang..." class="w-full bg-slate-100 border-2 border-transparent focus:border-indigo-300 rounded-2xl py-3 pl-10 pr-4 text-xs font-bold focus:outline-none transition-all shadow-inner">
                </div>
                <button onclick="exportToExcel()" class="bg-emerald-500 text-white rounded-2xl font-bold flex items-center justify-center shadow-lg active:scale-95">
                    📊
                </button>
            </div>

            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black text-slate-700 uppercase tracking-widest text-[10px]">Inventaris Tersimpan</h3>
                <span id="total-badge" class="text-[9px] bg-slate-200 px-3 py-1 rounded-full font-black text-slate-500 tracking-tighter">0 Item</span>
            </div>
            
            <div id="inventory-list" class="space-y-4">
                </div>
        </main>

        <footer class="p-6 text-center text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em]">
            Stock Master Pro &bull; Local Database
        </footer>
    </div>

    <script>
        let db;
        let currentId = "";
        let html5QrCode;

        // 1. DATABASE LOKAL
        const request = indexedDB.open("SmartInventoryDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("items", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderList();
        };

        // 2. LOGIKA SCANNER TERUPDATE
        async function startScanner() {
            // Cek protokol keamanan
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                alert("⚠️ Browser memblokir kamera di HTTP biasa. Silakan gunakan koneksi HTTPS (Upload ke Netlify/GitHub).");
                return;
            }

            const btnStart = document.getElementById('btn-start');
            const labelStart = document.getElementById('label-start');
            const btnStop = document.getElementById('btn-stop');
            const placeholder = document.getElementById('scanner-placeholder');

            labelStart.innerText = "⌛ Memulai...";
            btnStart.disabled = true;

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            try {
                const cameras = await Html5Qrcode.getCameras();
                if (cameras && cameras.length > 0) {
                    await html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 20, qrbox: { width: 250, height: 250 } },
                        (id) => {
                            currentId = id;
                            document.getElementById('info-box').classList.remove('hidden');
                            document.getElementById('result-id').innerText = "ID: " + id;
                            loadItemData(id);
                            stopScanner(); 
                            if(window.navigator.vibrate) window.navigator.vibrate(100);
                        }
                    );
                    
                    placeholder.classList.add('opacity-0');
                    btnStart.classList.add('hidden');
                    btnStart.disabled = false;
                    labelStart.innerText = "🔍 Mulai Scan";
                    btnStop.classList.remove('hidden');
                } else {
                    throw "Kamera tidak ditemukan.";
                }
            } catch (err) {
                console.error(err);
                alert("Gagal mengakses kamera. Pastikan izin sudah diberikan.");
                stopScanner();
                btnStart.disabled = false;
                labelStart.innerText = "🔍 Mulai Scan";
            }
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            document.getElementById('scanner-placeholder').classList.remove('opacity-0');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('label-start').innerText = "🔍 Mulai Scan";
        }

        // 3. LOGIKA DATA
        function loadItemData(id) {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const req = store.get(id);
            req.onsuccess = () => {
                const item = req.result || { nama: "", qty: 0 };
                document.getElementById('input-nama').value = item.nama;
                document.getElementById('result-qty').innerText = item.qty;
                document.getElementById('input-nama').focus();
            };
        }

        function updateStok(val) {
            let el = document.getElementById('result-qty');
            let newQty = parseInt(el.innerText) + val;
            if (newQty < 0) newQty = 0;
            el.innerText = newQty;
        }

        function saveItem() {
            const nama = document.getElementById('input-nama').value;
            const qty = parseInt(document.getElementById('result-qty').innerText);
            if(!nama) return alert("Isi Nama Barang!");

            const store = db.transaction(["items"], "readwrite").objectStore("items");
            store.put({ 
                id: currentId, 
                nama: nama, 
                qty: qty, 
                lastUpdate: new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) 
            });
            
            renderList();
            document.getElementById('info-box').classList.add('hidden');
            alert("✅ Tersimpan!");
        }

        function renderList() {
            const listContainer = document.getElementById('inventory-list');
            const totalBadge = document.getElementById('total-badge');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            listContainer.innerHTML = "";
            let count = 0;

            const store = db.transaction(["items"], "readonly").objectStore("items");
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    if (item.nama.toLowerCase().includes(searchTerm) || item.id.toLowerCase().includes(searchTerm)) {
                        count++;
                        listContainer.innerHTML += `
                            <div onclick="editExisting('${item.id}')" class="flex justify-between items-center p-4 bg-white border border-slate-100 rounded-[1.5rem] shadow-sm hover:shadow-md active:scale-95 transition-all cursor-pointer border-l-[6px] border-l-indigo-500">
                                <div class="overflow-hidden pr-2">
                                    <p class="font-black text-slate-800 truncate text-sm uppercase tracking-tighter">${item.nama}</p>
                                    <p class="text-[8px] text-indigo-400 font-bold mt-1">${item.lastUpdate}</p>
                                </div>
                                <div class="bg-indigo-50 px-4 py-1 rounded-xl text-center min-w-[60px]">
                                    <p class="text-lg font-black text-indigo-600">${item.qty}</p>
                                    <p class="text-[7px] text-indigo-300 font-bold uppercase">Unit</p>
                                </div>
                            </div>`;
                    }
                    cursor.continue();
                }
                totalBadge.innerText = count + " Item";
            };
        }

        function editExisting(id) {
            currentId = id;
            document.getElementById('info-box').classList.remove('hidden');
            document.getElementById('result-id').innerText = "ID: " + id;
            loadItemData(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeInfoBox() { document.getElementById('info-box').classList.add('hidden'); }

        function exportToExcel() {
            const store = db.transaction(["items"], "readonly").objectStore("items");
            const allData = [];
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    allData.push(cursor.value);
                    cursor.continue();
                } else {
                    if(allData.length === 0) return alert("Data kosong!");
                    const worksheet = XLSX.utils.json_to_sheet(allData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "STOK");
                    XLSX.writeFile(workbook, `Stok_Master_Report.xlsx`);
                }
            };
        }
    </script>

    <style>
        #reader__status_span { display: none; }
        #reader video { object-fit: cover !important; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</body>
</html>
